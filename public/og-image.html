<!DOCTYPE html>
<html><head><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1200px; height:630px; background:linear-gradient(140deg,#071E3D 0%,#1B3F8A 50%,#0e7abf 100%); display:flex; align-items:center; justify-content:center; font-family:Georgia,serif; color:white; }
  .card { text-align:center; }
  .badge { display:inline-block; padding:8px 20px; border-radius:99px; font-size:14px; font-weight:700; letter-spacing:3px; text-transform:uppercase; background:rgba(0,174,239,0.2); border:1px solid rgba(0,174,239,0.4); color:#7DDEFF; margin-bottom:24px; font-family:system-ui; }
  h1 { font-size:56px; font-weight:400; line-height:1.3; margin-bottom:16px; }
  h1 span { background:linear-gradient(90deg,#7DDEFF,#C2EDFF); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .sub { font-size:22px; color:rgba(255,255,255,0.65); font-family:system-ui; margin-bottom:32px; }
  .info { display:flex; gap:32px; justify-content:center; font-family:system-ui; }
  .info div { font-size:15px; color:rgba(255,255,255,0.5); }
  .info strong { color:#7DDEFF; }
</style></head><body>
<div class="card">
  <div class="badge">Terapia mHBOT</div>
  <h1>Komora Hiperbaryczna<br><span>Śląsk – Sosnowiec</span></h1>
  <p class="sub">Profesjonalna tlenoterapia hiperbaryczna • Sesja próbna 130 zł</p>
  <div class="info">
    <div>📍 <strong>al. Zwycięstwa 6</strong></div>
    <div>📞 <strong>608 531 549</strong></div>
    <div>⭐ <strong>5.0</strong> Google</div>
  </div>
</div>
</body></html>
